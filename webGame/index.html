<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Space Agency Race</title>
<meta name="theme-color" content="#070b16">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Space Race">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="assets/icons/mission.png">
<link rel="stylesheet" href="css/game.css">
<link rel="icon" href="assets/icons/mission.png">
</head>
<body>
<div id="app">
  <div id="screen-lobby" class="screen">
    <div class="stars"></div>
    <div class="lobby-box">
      <h1 class="title">SPACE AGENCY RACE</h1>
      <p class="subtitle">Lead a rival space agency: design rockets, chase launch windows, complete missions.</p>
      <div id="lobby-content"></div>
    </div>
  </div>
  <div id="screen-game" class="screen hidden">
    <div class="stars"></div>
    <div id="topbar"></div>
    <div id="layout">
      <div id="left-col"></div>
      <div id="center-col">
        <div id="board-wrap"></div>
        <div id="log-panel"><div id="log-head">Mission Control Log <span id="log-toggle">▾</span></div><div id="log-body"></div></div>
      </div>
      <div id="right-col"></div>
    </div>
    <div id="bottombar">
      <div id="action-bar"></div>
      <div id="hand-area"></div>
    </div>
    <div id="mobile-tabs"></div>
    <div id="turn-banner" class="hidden"></div>
  </div>
  <div id="modal-root"></div>
  <div id="toast-root"></div>
  <div id="dice-overlay" class="hidden"></div>
</div>
<script type="module" src="js/main.js"></script>
</body>
</html>
