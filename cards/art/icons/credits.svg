<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!--
    Credits — hexagonal coin outline (sci-fi currency token)
    with a solid circle center marking the denomination.
    Hexagon: center (12,12), circumradius R=9, flat-top orientation (0° first vertex).
    Vertices at 0°,60°,120°,180°,240°,300° → (21,12),(16.5,19.79),(7.5,19.79),(3,12),(7.5,4.21),(16.5,4.21)
  -->
  <!-- Hex outline -->
  <polygon fill="none" stroke="white" stroke-width="2" stroke-linejoin="round"
    points="21,12
            16.5,19.79
            7.5,19.79
            3,12
            7.5,4.21
            16.5,4.21"/>
  <!-- Center denomination dot -->
  <circle cx="12" cy="12" r="3" fill="white"/>
</svg>
