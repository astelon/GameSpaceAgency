<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="barrelGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#b86f12" />
      <stop offset="50%" stop-color="#8c4a0a" />
      <stop offset="100%" stop-color="#6b3a07" />
    </linearGradient>
    <linearGradient id="shine" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#083b2d" />

  <!-- centered container -->
  <g transform="translate(200,120)">
    <!-- background plate -->
    <rect x="-170" y="-80" width="340" height="200" rx="14" fill="#0b6b57" />

    <!-- stylized barrel (centered) -->
    <!-- body -->
    <rect x="-60" y="-40" width="120" height="100" rx="20" fill="url(#barrelGrad)" />
    <!-- top and bottom ellipses to give 3D barrel look -->
    <ellipse cx="0" cy="-40" rx="60" ry="18" fill="#5a2f03" />
    <ellipse cx="0" cy="60" rx="60" ry="18" fill="#4a2602" />
    <!-- metal bands -->
    <rect x="-66" y="-6" width="132" height="8" rx="4" fill="#3a2a1a" />
    <rect x="-66" y="18" width="132" height="8" rx="4" fill="#3a2a1a" />
    <!-- highlight -->
    <rect x="-50" y="-30" width="30" height="80" rx="10" fill="url(#shine)" />
  </g>

  <!-- label centered below container -->
  <text x="200" y="260" font-size="18" font-family="Arial" fill="#ffffff" text-anchor="middle">Tank</text>
</svg>