<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="suppBg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a3a4a" />
      <stop offset="100%" stop-color="#052830" />
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="100%" r="70%">
      <stop offset="0%" stop-color="#ff6b00" stop-opacity="0.75" />
      <stop offset="55%" stop-color="#ff2200" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="shieldGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#506070" />
      <stop offset="100%" stop-color="#1a2530" />
    </linearGradient>
    <linearGradient id="chuteGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ff8840" />
      <stop offset="100%" stop-color="#e04410" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#suppBg)" />

  <!-- centered plate -->
  <g transform="translate(200,130)">
    <rect x="-170" y="-90" width="340" height="200" rx="14" fill="#0d3545" />

    <!-- plasma / re-entry glow behind shield -->
    <ellipse cx="0" cy="60" rx="110" ry="44" fill="url(#glowGrad)" />

    <!-- heat shield (Apollo-style oblate shape) -->
    <path d="M -68 8 C -68 -32 -42 -58 0 -58 C 42 -58 68 -32 68 8 C 68 42 42 62 0 62 C -42 62 -68 42 -68 8 Z"
          fill="url(#shieldGrad)" stroke="#3a4e5e" stroke-width="1.5" />

    <!-- ceramic tile seam lines -->
    <g stroke="#2a3840" stroke-width="1" fill="none" opacity="0.65">
      <path d="M -63 5 C -46 12 -20 16 0 16 C 20 16 46 12 63 5" />
      <path d="M -52 -22 C -38 -16 -18 -11 0 -11 C 18 -11 38 -16 52 -22" />
      <path d="M -32 -44 C -22 -39 -10 -36 0 -36 C 10 -36 22 -39 32 -44" />
    </g>

    <!-- ablative glow on leading edge -->
    <path d="M -68 8 C -68 -32 -42 -58 0 -58 C 42 -58 68 -32 68 8"
          stroke="#ff8800" stroke-width="3" fill="none" opacity="0.55" stroke-linecap="round" />
    <!-- bottom rim heat -->
    <path d="M -68 8 C -68 42 -42 62 0 62 C 42 62 68 42 68 8"
          fill="#ff4400" opacity="0.18" />

    <!-- parachute canopy -->
    <path d="M -52 -74 C -62 -86 -40 -96 0 -96 C 40 -96 62 -86 52 -74 C 30 -66 -30 -66 -52 -74 Z"
          fill="url(#chuteGrad)" stroke="#c03808" stroke-width="1" />
    <!-- canopy panel lines -->
    <g stroke="#c03808" stroke-width="1" opacity="0.85" fill="none">
      <line x1="0" y1="-96" x2="0" y2="-74" />
      <line x1="-26" y1="-93" x2="-26" y2="-74" />
      <line x1="26" y1="-93" x2="26" y2="-74" />
    </g>

    <!-- suspension lines from canopy to shield top -->
    <g stroke="#c8b8a0" stroke-width="1" opacity="0.65">
      <line x1="-52" y1="-74" x2="-32" y2="-58" />
      <line x1="-26" y1="-74" x2="-16" y2="-58" />
      <line x1="0" y1="-74" x2="0" y2="-58" />
      <line x1="26" y1="-74" x2="16" y2="-58" />
      <line x1="52" y1="-74" x2="32" y2="-58" />
    </g>

    <!-- stars -->
    <g fill="#ffffff" fill-opacity="0.85">
      <circle cx="-140" cy="-65" r="1.8" />
      <circle cx="132" cy="-58" r="1.5" />
      <circle cx="-115" cy="38" r="1.2" />
      <circle cx="148" cy="28" r="1.6" />
      <circle cx="-85" cy="-25" r="1.1" />
      <circle cx="110" cy="-20" r="1.3" />
    </g>
  </g>

  <!-- label centered below -->
  <text x="200" y="264" font-size="18" font-family="Arial" fill="#ffffff" text-anchor="middle">Support</text>
</svg>
