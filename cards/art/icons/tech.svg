<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="techBg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3a" />
      <stop offset="100%" stop-color="#2a2a2a" />
    </linearGradient>
    <linearGradient id="chipGrad" x1="0" x2="1">
      <stop offset="0%" stop-color="#ffd166" />
      <stop offset="100%" stop-color="#ffb94d" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#2a2a2a" />

  <!-- centered plate -->
  <g transform="translate(200,120)">
    <rect x="-170" y="-80" width="340" height="200" rx="14" fill="url(#techBg)" />

    <!-- stylized chip + gear (centered) -->
    <!-- chip body -->
    <rect x="-36" y="-28" width="72" height="56" rx="6" fill="url(#chipGrad)" stroke="#5a4a28" stroke-width="1" />
    <!-- pins -->
    <g fill="#c89b4a">
      <rect x="-58" y="-22" width="12" height="6" rx="1" />
      <rect x="46" y="-22" width="12" height="6" rx="1" />
      <rect x="-58" y="16" width="12" height="6" rx="1" />
      <rect x="46" y="16" width="12" height="6" rx="1" />
    </g>
    <!-- circuit traces -->
    <g stroke="#e8d3a1" stroke-width="2" fill="none">
      <path d="M -12 -8 L -40 -32" />
      <path d="M 12 8 L 40 32" />
      <path d="M -12 8 L -40 16" />
      <path d="M 12 -8 L 40 -16" />
    </g>
    <!-- small gear behind chip to indicate tech/mechanics -->
    <g transform="translate(90,0)">
      <circle cx="0" cy="0" r="26" fill="#3b3b3b" />
      <path d="M -2 -26 L 2 -26 L 6 -18 L 14 -12 L 18 -6 L 18 6 L 14 12 L 6 18 L 2 26 L -2 26 L -6 18 L -14 12 L -18 6 L -18 -6 L -14 -12 L -6 -18 Z" fill="#5a5a5a" opacity="0.95" />
      <circle cx="0" cy="0" r="8" fill="#ffd166" />
    </g>
  </g>

  <!-- label centered below -->
  <text x="200" y="260" font-size="18" font-family="Arial" fill="#ffffff" text-anchor="middle">Tech</text>
</svg>